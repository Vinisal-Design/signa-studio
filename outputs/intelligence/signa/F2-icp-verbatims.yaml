usage_guide:
  for_wiebe:
    description: "VOC raw — copie verbatim em hero/about/proof. NÃO sanitize."
    technique: "Use 'message mining' — pegue palavra exata do verbatim e plante no copy"
    example:
      input_verbatim: "tô gastando 4 mil por mês em ads e o povo clica e some"
      output_copy: "Você gasta 4 mil por mês em ads. O cliente clica no anúncio. Vai pro seu site. E some. Conhece esse filme?"

  for_halbert:
    description: "Use trauma anterior (pattern_01) e inveja concorrente (pattern_03) como ganchos narrativos"
    technique: "Conta história de UM dos avatares (Marcelo dentista) na primeira pessoa"

  for_carlton:
    description: "Use a aversão a jargão (pattern_04) — escreva como o vizinho de bar do Marcelo"
    technique: "Toda frase técnica vira frase de boteco. Teste: 'Minha tia entenderia?'"

  for_klaff:
    description: "Use trauma + medo de pegadinha (pattern_05) pra reframe no FAQ"
    technique: "Cada objeção da lista vira reframe. Reposiciona ceticismo como sabedoria do cliente."

  for_marshall:
    description: "Use aversão a jargão (pattern_04) pra construir insight cascade que ENSINA"
    technique: "Educação como venda. Cliente sai sabendo mais do que entrou."

  for_bencivenga:
    description: "Use TODOS os patterns como matéria pra bullets/fascinations"
    technique: "Cada bullet = trauma específico + reframe + benefício SIGNA"

