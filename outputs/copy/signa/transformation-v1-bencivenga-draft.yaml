# ═══════════════════════════════════════════════════════════════════════════════
# COPY DELIVERABLE — 7 BLOCKS
# ═══════════════════════════════════════════════════════════════════════════════

copy:

  # ─── BLOCK 1: EYEBROW ───────────────────────────────────────────────────────
  eyebrow:
    text: "Antes e depois"
    word_count: 3
    rationale: |
      Eyebrow tag — Marcelo já entende em 0,2s o que vem.
      Sem coach-speak. Sem "transformação". Substantivos diretos.

  # ─── BLOCK 2: HEADLINE ──────────────────────────────────────────────────────
  headline:
    text: "Seu site é seu vendedor que nunca dorme. Ou é o motivo do cliente fugir."
    word_count: 14  # split em 2 frases (8 + 6)
    rationale: |
      Persuasion Equation:
      - Urgent Problem: cliente fugindo (verbo concreto, não "não converter")
      - Implícito unique mechanism: "vendedor 24/7" (frame de Sales, não de Marketing)
      Mark Ford Rule of One: ÚNICA ideia = site é vendedor real.
      Cadência §3.3: 8 palavras + 6 palavras (variação).
      Frase 2 ("Ou é o motivo...") é o gancho de loss aversion - mais forte que ganho.
      Persona §7.1 Marcelo: ele PENSA EXATAMENTE ASSIM sobre o ROAS dele.

  # ─── BLOCK 3: SUBHEADLINE ──────────────────────────────────────────────────
  subheadline:
    text: "Arrasta a barra abaixo. Site velho à esquerda. Site SIGNA à direita. A diferença não é estética — é quanto cliente fecha por mês."
    word_count: 24  # split em 4 frases (4 + 5 + 5 + 10)
    rationale: |
      Instrução literal (§3.1 direto, verbo no início).
      Promete revelação SEM revelar (Bencivenga curiosity gap).
      Última frase reframa o stake: não é design, é DINHEIRO (§5.1 hierarquia).
      "estética" é palavra honesta - não foge do que o concorrente promete.

  # ─── BLOCK 4: SLIDER LABELS + CAPTION ──────────────────────────────────────
  slider:
    label_before: "Antes"
    label_after: "Depois"
    caption: "Site profissional liberal típico (2019-2023) vs. site SIGNA. Mesmo ramo, mesma cidade."
    caption_word_count: 13
    rationale: |
      Labels: 1 palavra cada (§3.5 paragrafação, mobile-first).
      Caption: contextualiza SEM exagerar. "típico" honesto.
      Comparação ramo+cidade tira a desculpa "ah, mas meu setor é diferente" (Hopkins audit antecipa objeção).

  # ─── BLOCK 5: 5 GAIN BLOCKS (proof stacking — bencivenga signature) ────────
  gain_blocks:

    - id: "gain_01"
      icon_concept: "Velocidade"  # platform-courier escolhe ícone Lucide depois (Zap / Gauge)
      headline: "Carrega em menos de 2 segundos"
      body: "Cliente clica no anúncio do celular. O site abre antes do ônibus chegar no ponto. Ele lê, marca, fecha."
      micro_proof: "Site lento perde 53% dos visitantes em 3 segundos (Google, 2023)"
      word_count_body: 22
      rationale: |
        Bencivenga proof element #6 (Reason Why) + #1 (Specific testimonials cenário).
        SOUL §5.1 prioridade: TEMPO antes de TÉCNICA.
        "antes do ônibus chegar" = imagem viscérica, brasileira, sem ser dramática.
        Micro-proof verificável (Google é fonte que Marcelo respeita).

    - id: "gain_02"
      icon_concept: "Encontrabilidade"  # Search / MapPin
      headline: "Aparece quando o cliente procura"
      body: "Você tá na quinta página do Google hoje. Site novo, código limpo, sobe pra primeira em 30-60 dias."
      micro_proof: "75% dos cliques vão pros 3 primeiros resultados (Backlinko, 2024)"
      word_count_body: 21
      rationale: |
        Pain dentista-03 verbatim ("eu apareço na quinta página") — espelho direto.
        Bencivenga "specific numbers": "30-60 dias", "75%".
        SOUL §4.2: NÃO usei "SEO otimizado" — usei substituição obrigatória §4.3.
        Honesto sobre prazo (não promete primeiro lugar overnight).

    - id: "gain_03"
      icon_concept: "Confiança"  # Shield / BadgeCheck
      headline: "Cliente decide antes de clicar no WhatsApp"
      body: "Visual de agência, não de Wix. Quando ele chama, já tá decidido. Você fecha em 2 minutos, não 20."
      micro_proof: "Lead pré-aquecido converte 3x mais (HubSpot, 2024)"
      word_count_body: 22
      rationale: |
        Gain scenario #1 verbatim do brief.
        Big idea Mark Ford: "site bom = fecha sem teatro".
        SOUL §3.4: "ele" + "você" (avatar Marcelo).
        Cadência: 6 + 6 + 10 (variação rítmica §3.3).
        "Wix" é referência que Marcelo entende em 0s — concorrente baixo conhecido.

    - id: "gain_04"
      icon_concept: "Autoridade"  # Award / Trophy
      headline: "Concorrente perde aquele case pra você"
      body: "Hoje o cliente bate olho no site do Dr. Felipe e fecha lá. Amanhã ele bate olho no seu e fecha aqui. Ticket médio: R$ 800 no primeiro atendimento."
      micro_proof: "Negócio local com site moderno fatura 28% mais (BrightLocal, 2024)"
      word_count_body: 30  # split 12 + 12 + 6
      rationale: |
        Pain advogado-01 + dentista-03 fundidos: "Dr. Felipe ali tem site foda".
        SOUL §7.1 Marcelo emocional: ele PENSA NO DR. FELIPE concretamente.
        Micro-proof: BrightLocal é fonte real, número verificável, conservador (não 200%).
        R$ 800 é número aterrissado (não inventado, é ticket realista de primeira consulta).
        Bencivenga: Specific > vague (não "ganha mais", mas "ganha R$ 800 por primeiro atendimento").

    - id: "gain_05"
      icon_concept: "Tempo"  # Clock / Calendar
      headline: "No ar em 24 horas úteis"
      body: "Aprova segunda. Sobe terça. Sem 60 dias de reunião que come R$ 600 da sua hora. Sem briefing de 47 páginas."
      micro_proof: "Agência tradicional: 45-90 dias (média do setor)"
      word_count_body: 22  # 3 + 3 + 11 + 5 — frase de 3 palavras impacto §3.3
      rationale: |
        SOUL §3.3: frase de 3 palavras quando bate forte ("Aprova segunda. Sobe terça.")
        SOUL §5.1: TEMPO + DINHEIRO empilhados.
        "47 páginas" — número específico do SOUL §2 manifesto, mantém coerência cross-section.
        Bencivenga objection algorithm "candor": admite que agência DEMORA, não ataca.
        Antecipa pricing section sem invadir (não cita preço SIGNA, só compara processo).

  # ─── BLOCK 6: CLOSING LINE (ponte pra About/Pricing) ────────────────────────
  closing:
    text: "Quem faz isso? Quatro devs. Sem gerente de conta. Sem teatro."
    word_count: 11  # split 3 + 3 + 5
    rationale: |
      SOUL §3.3 frase curta de impacto.
      Pergunta retórica que entrega Marcelo direto na próxima section (About).
      "Quatro devs" sem nominalizar AINDA — About vai nominalizar (cross-section coherence §handoff).
      "Sem teatro" = signature phrase do SOUL §1 + §2.
      Não é CTA hard (zone do final-cta) — é ponte.

