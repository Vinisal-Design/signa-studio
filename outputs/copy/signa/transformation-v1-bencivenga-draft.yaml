      soul_ref: "§3.1, §3.3"
    - point: "Avatar Marcelo (B2) é referência primária"
      evidence: "'gastando 4 mil em ads', 'quinta página', 'Dr. Felipe' são frases LITERAIS do SOUL §7.1 e do brief verbatims."
      soul_ref: "§7.1"

  voice_cosplay_risks_avoided:
    - risk: "Bencivenga signature pode soar americano premium ('the secret to...', 'discover')"
      avoided_by: "Zero uso de 'segredo', 'descubra', 'revelação'. Bullets em PT-BR direto, ritmo brasileiro."
    - risk: "Proof stacking pode virar academic-style com fontes excessivas"
      avoided_by: "1 micro-proof por bloco, fonte 1-line, número conservador. Não é magalog de suplemento."
    - risk: "Persuasion Equation pode forçar estrutura corporativa"
      avoided_by: "Equation aplicada em estrutura, não vocabulário. Headline sem 'unique', 'proven', 'guaranteed'."

  banned_vocab_scan:
    considered_and_rejected:
      - "transformação" → substituído por "diferença"
      - "potencial" → substituído por "quanto cliente fecha"
      - "solução" → substituído por "site"
      - "estratégia" → substituído por "código limpo"
      - "moderno" → substituído por "visual de agência"
      - "experiência" → substituído por "fecha em 2 minutos"
      - "exclusivo" → substituído por nenhum (não usado)
      - "revolucionário" → substituído por nenhum (não usado)
    confirmed_zero_usage: true
    soul_ref: "§4.2 banido total + §4.3 substituições obrigatórias"

  avatar_check:
    primary: "Marcelo (B2) — toda referência verbal, todos os números, todo gancho emocional"
    secondary: "Cláudia (B3) — closing line ('Sem gerente de conta. Sem teatro.') é frase que ela ENTENDE sem traduzir"

