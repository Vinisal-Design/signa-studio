  target_persona_secondary: "B3 — Cláudia, restaurante, ZERO jargão"
  big_idea_mark_ford: "Site bom = mais cliente fechado, sem teatro"
  schwartz_awareness: 3  # solution-aware (sabe que precisa de site novo)
